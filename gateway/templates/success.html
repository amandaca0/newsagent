<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NewsAgent — you're in</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 520px; margin: 40px auto; padding: 0 20px; line-height: 1.5;
    }
    .card {
      background: #f4fff0; border: 1px solid #c3e6b6; color: #204a15;
      padding: 18px 22px; border-radius: 10px; margin-bottom: 20px;
    }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 6px 14px; }
    dt { color: #666; }
    dd { margin: 0; }
    a { color: #0a66c2; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin-top:0">You're signed up.</h2>
    <p>Your first digest will arrive at the next scheduled time.</p>
  </div>

  <dl>
    <dt>Phone</dt><dd>{{ user.phone }}</dd>
    <dt>Topics</dt><dd>{{ user.interests | join(', ') }}</dd>
    <dt>Schedule</dt><dd>{{ frequency_label }}</dd>
  </dl>

  <p><a href="/">← Sign up another user</a></p>
</body>
</html>
