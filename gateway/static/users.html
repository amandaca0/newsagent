<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NewsAgent — Admin</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=bespoke-serif@400,400i,500,600,700&f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { background: #fcfaf7; }
    body {
      font-family: 'Satoshi', -apple-system, sans-serif;
      background: #fcfaf7;
      color: #18181b;
      min-height: 100vh;
    }
    .serif { font-family: 'Bespoke Serif', Georgia, serif; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-backdrop { animation: fadeIn 150ms ease-out; }
    .modal-panel { animation: slideUp 180ms ease-out; }
    input[type="time"] {
      font-family: 'Satoshi', sans-serif;
      background: #fcfaf7;
    }
    /* thin top rule newspaper style */
    .rule-top { border-top: 3px double #18181b; }
    .rule-thin { border-top: 1px solid #d4d4d8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;

    const FREQ_OPTIONS = [
      { value: 'every_4h',     label: 'Every 4 hours',     kind: 'startTime', defaults: { h: 8,  m: 0 } },
      { value: 'every_8h',     label: 'Every 8 hours',     kind: 'startTime', defaults: { h: 0,  m: 0 } },
      { value: 'morning_9am',  label: 'Morning briefing',  kind: 'oneTime',   defaults: { h: 9,  m: 0 } },
      { value: 'evening_6pm',  label: 'Evening wrap-up',   kind: 'oneTime',   defaults: { h: 18, m: 0 } },
      { value: 'twice_daily',  label: 'Morning + evening', kind: 'twoTimes',  defaults: { am: { h: 9, m: 0 }, pm: { h: 18, m: 0 } } },
      { value: 'custom_daily', label: 'Custom time',       kind: 'oneTime',   defaults: { h: 9,  m: 0 } },
    ];
    const FREQ_BY_VALUE = Object.fromEntries(FREQ_OPTIONS.map(o => [o.value, o]));

    function pad(n) { return String(n).padStart(2, '0'); }
    function hmToHHMM({ h, m }) { return `${pad(h)}:${pad(m)}`; }

    function localTimeToUtc(hhmm) {
      if (!hhmm) return null;
      const [h, m] = hhmm.split(':').map(Number);
      if (isNaN(h) || isNaN(m)) return null;
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return { hour: d.getUTCHours(), minute: d.getUTCMinutes() };
    }
    function utcHmToLocalHm(hour, minute) {
      const d = new Date();
      d.setUTCHours(hour, minute, 0, 0);
      return { h: d.getHours(), m: d.getMinutes() };
    }
    function tzLabel() {
      try { return Intl.DateTimeFormat().resolvedOptions().timeZone; }
      catch { return 'local'; }
    }

    function describeOption(opt, t) {
      if (opt.kind === 'oneTime') return `Once a day at ${hmToHHMM(t)}`;
      if (opt.kind === 'twoTimes') return `At ${hmToHHMM(t.am)} and ${hmToHHMM(t.pm)}`;
      const stepHours = opt.value === 'every_4h' ? 4 : 8;
      const fires = opt.value === 'every_4h' ? 4 : 3;
      const startMin = t.h * 60 + t.m;
      const out = [];
      for (let i = 0; i < fires; i++) {
        const total = (startMin + i * stepHours * 60) % (24 * 60);
        out.push(`${pad(Math.floor(total / 60))}:${pad(total % 60)}`);
      }
      return `Fires at ${out.join(', ')}`;
    }

    function userTimesForOpt(opt, user) {
      if (opt.kind === 'twoTimes') {
        const am = user.custom_push_hour   != null ? utcHmToLocalHm(user.custom_push_hour,   user.custom_push_minute   || 0) : opt.defaults.am;
        const pm = user.custom_push_hour_2 != null ? utcHmToLocalHm(user.custom_push_hour_2, user.custom_push_minute_2 || 0) : opt.defaults.pm;
        return { am, pm };
      }
      if (user.custom_push_hour != null) return utcHmToLocalHm(user.custom_push_hour, user.custom_push_minute || 0);
      return opt.defaults;
    }

    function localScheduleLabel(user) {
      const opt = FREQ_BY_VALUE[user.frequency];
      if (!opt) return user.frequency;
      return `${opt.label} — ${describeOption(opt, userTimesForOpt(opt, user))}`;
    }

    function App() {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [editing, setEditing] = useState(null);
      const [toast, setToast] = useState(null);

      const refresh = async () => {
        setLoading(true);
        try {
          const resp = await fetch('/api/users');
          const data = await resp.json();
          setUsers(data.users || []);
          setError(null);
        } catch (e) {
          setError(String(e));
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { refresh(); }, []);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      const onSave = async (userId, payload) => {
        const resp = await fetch(`/api/users/${userId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Save failed.');
        setUsers(us => us.map(u => u.user_id === userId ? data.user : u));
        setEditing(null);
        showToast('Saved.');
      };

      const onDelete = async (user) => {
        if (!confirm(`Delete ${user.phone}? This removes all their data.`)) return;
        const resp = await fetch(`/api/users/${user.user_id}`, { method: 'DELETE' });
        const data = await resp.json();
        if (!resp.ok) { alert(data.error || 'Delete failed.'); return; }
        setUsers(us => us.filter(u => u.user_id !== user.user_id));
        showToast('Deleted.');
      };

      return (
        <div className="min-h-screen" style={{background:'#fcfaf7'}}>
          <Header />
          <main className="max-w-5xl mx-auto px-6 py-10">
            {/* Page heading */}
            <div className="rule-top pt-4 mb-8">
              <div className="flex items-end justify-between">
                <div>
                  <p className="text-xs tracking-widest uppercase text-zinc-400 mb-1" style={{fontFamily:'Satoshi,sans-serif'}}>Admin Console</p>
                  <h1 className="serif text-4xl font-bold text-zinc-900 leading-tight">Subscribers</h1>
                  <p className="text-sm text-zinc-500 mt-1">{users.length} enrolled</p>
                </div>
                <button onClick={refresh}
                  className="text-xs tracking-widest uppercase text-zinc-600 border border-zinc-300 px-4 py-2 hover:bg-zinc-100 transition"
                  style={{fontFamily:'Satoshi,sans-serif'}}>
                  ↻ Refresh
                </button>
              </div>
            </div>

            {error && (
              <div className="mb-6 px-4 py-3 border border-red-300 bg-red-50 text-red-700 text-sm">
                {error}
              </div>
            )}

            {loading ? (
              <div className="text-center py-20 text-zinc-400 text-sm tracking-widest uppercase">Loading…</div>
            ) : users.length === 0 ? (
              <EmptyState />
            ) : (
              <div className="grid gap-px bg-zinc-200 border border-zinc-200 md:grid-cols-2">
                {users.map(u => (
                  <UserCard key={u.user_id} user={u} onEdit={() => setEditing(u)} onDelete={() => onDelete(u)} />
                ))}
              </div>
            )}
          </main>

          {editing && (
            <EditModal
              user={editing}
              onClose={() => setEditing(null)}
              onSave={onSave}
            />
          )}

          {toast && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-2.5 bg-zinc-900 text-white text-sm z-50 shadow-lg"
                 style={{fontFamily:'Satoshi,sans-serif'}}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    function Header() {
      return (
        <header style={{background:'#fcfaf7', borderBottom:'3px double #18181b'}}>
          <div className="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
            <div>
              <span className="serif text-2xl font-bold text-zinc-900 tracking-tight">NewsAgent</span>
              <span className="ml-3 text-xs tracking-widest uppercase text-zinc-400" style={{fontFamily:'Satoshi,sans-serif'}}>Admin</span>
            </div>
            <nav className="flex gap-6 text-xs tracking-widest uppercase" style={{fontFamily:'Satoshi,sans-serif'}}>
              <a href="/" className="text-zinc-500 hover:text-zinc-900 transition">← Sign up</a>
              <a href="/users" className="text-zinc-900 font-semibold border-b border-zinc-900 pb-px">Users</a>
            </nav>
          </div>
        </header>
      );
    }

    function EmptyState() {
      return (
        <div className="text-center py-20 border border-zinc-200" style={{background:'#fcfaf7'}}>
          <p className="serif text-2xl text-zinc-400 mb-3">No subscribers yet.</p>
          <p className="text-sm text-zinc-500">
            Sign someone up on the{' '}
            <a href="/" className="underline text-zinc-700 hover:text-zinc-900">signup page</a>.
          </p>
        </div>
      );
    }

    function UserCard({ user, onEdit, onDelete }) {
      return (
        <div className="p-6 hover:bg-zinc-50 transition" style={{background:'#fcfaf7'}}>
          {/* Phone + status */}
          <div className="flex items-start justify-between mb-4">
            <div>
              <div className="font-mono text-base font-semibold text-zinc-900 tracking-tight">{user.phone}</div>
              <div className="mt-0.5 text-xs text-zinc-400" style={{fontFamily:'Satoshi,sans-serif'}}>
                {user.onboarding_state === "DONE" ? (
                  <span className="flex items-center gap-1 text-emerald-700 font-medium">
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block"></span> active
                  </span>
                ) : (
                  <span className="text-amber-600 font-medium">onboarding</span>
                )}
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={onEdit}
                className="text-xs tracking-widest uppercase border border-zinc-900 px-3 py-1.5 text-zinc-900 hover:bg-zinc-900 hover:text-white transition"
                style={{fontFamily:'Satoshi,sans-serif'}}>
                Edit
              </button>
              <button onClick={onDelete}
                className="text-xs tracking-widest uppercase border border-zinc-300 px-3 py-1.5 text-zinc-400 hover:border-red-400 hover:text-red-600 transition"
                style={{fontFamily:'Satoshi,sans-serif'}}>
                Delete
              </button>
            </div>
          </div>

          {/* Topics */}
          <div className="mb-4">
            <p className="text-xs tracking-widest uppercase text-zinc-400 mb-2" style={{fontFamily:'Satoshi,sans-serif'}}>Topics</p>
            <div className="flex flex-wrap gap-1.5">
              {(user.interests || []).length === 0 ? (
                <span className="text-sm text-zinc-400 italic">none</span>
              ) : user.interests.map(t => (
                <span key={t}
                  className="px-2.5 py-0.5 text-xs border border-zinc-300 text-zinc-700"
                  style={{fontFamily:'Satoshi,sans-serif'}}>
                  {t}
                </span>
              ))}
            </div>
          </div>

          {/* Schedule */}
          <div className="rule-thin pt-3">
            <p className="text-xs tracking-widest uppercase text-zinc-400 mb-1" style={{fontFamily:'Satoshi,sans-serif'}}>Schedule</p>
            <p className="text-sm text-zinc-700" style={{fontFamily:'Satoshi,sans-serif'}}>{localScheduleLabel(user)}</p>
          </div>
        </div>
      );
    }

    function SchedulePicker({ opt, value, onChange }) {
      const inputCls = "px-3 py-2 border border-zinc-300 focus:border-zinc-900 outline-none text-sm bg-transparent";
      if (opt.kind === 'twoTimes') {
        return (
          <div className="mt-3 p-4 border border-zinc-200 space-y-3" style={{background:'#f5f3ef'}}>
            <div>
              <label className="block text-xs tracking-widest uppercase text-zinc-500 mb-1.5" style={{fontFamily:'Satoshi,sans-serif'}}>Morning time</label>
              <input type="time" value={hmToHHMM(value.am)}
                onChange={e => {
                  const [h, m] = e.target.value.split(':').map(Number);
                  if (!isNaN(h) && !isNaN(m)) onChange({ ...value, am: { h, m } });
                }}
                className={inputCls} />
            </div>
            <div>
              <label className="block text-xs tracking-widest uppercase text-zinc-500 mb-1.5" style={{fontFamily:'Satoshi,sans-serif'}}>Evening time</label>
              <input type="time" value={hmToHHMM(value.pm)}
                onChange={e => {
                  const [h, m] = e.target.value.split(':').map(Number);
                  if (!isNaN(h) && !isNaN(m)) onChange({ ...value, pm: { h, m } });
                }}
                className={inputCls} />
            </div>
            <p className="text-xs text-zinc-400" style={{fontFamily:'Satoshi,sans-serif'}}>{tzLabel()}</p>
          </div>
        );
      }
      const label = opt.kind === 'startTime' ? 'Starting time' : 'Time';
      return (
        <div className="mt-3 p-4 border border-zinc-200" style={{background:'#f5f3ef'}}>
          <label className="block text-xs tracking-widest uppercase text-zinc-500 mb-1.5" style={{fontFamily:'Satoshi,sans-serif'}}>{label} (your local time)</label>
          <input type="time" value={hmToHHMM(value)}
            onChange={e => {
              const [h, m] = e.target.value.split(':').map(Number);
              if (!isNaN(h) && !isNaN(m)) onChange({ h, m });
            }}
            className={inputCls} />
          <p className="mt-2 text-xs text-zinc-400" style={{fontFamily:'Satoshi,sans-serif'}}>{tzLabel()}</p>
        </div>
      );
    }

    function defaultTimesFor(user) {
      const out = {};
      for (const opt of FREQ_OPTIONS) {
        out[opt.value] = (opt.value === user.frequency)
          ? userTimesForOpt(opt, user)
          : opt.defaults;
      }
      return out;
    }

    function EditModal({ user, onClose, onSave }) {
      const [topics, setTopics] = useState((user.interests || []).join(', '));
      const [frequency, setFrequency] = useState(user.frequency || 'morning_9am');
      const [times, setTimes] = useState(() => defaultTimesFor(user));
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);

      const topicList = topics.split(/[,\n;]/).map(t => t.trim()).filter(Boolean);
      const valid = topicList.length >= 5;

      const save = async () => {
        setError(null);
        setSaving(true);
        try {
          const opt = FREQ_BY_VALUE[frequency];
          const t = times[frequency];
          const payload = { topics: topicList, frequency };
          if (opt.kind === 'twoTimes') {
            const u1 = localTimeToUtc(hmToHHMM(t.am));
            const u2 = localTimeToUtc(hmToHHMM(t.pm));
            if (!u1 || !u2) throw new Error("Pick valid times.");
            payload.custom_hour = u1.hour;
            payload.custom_minute = u1.minute;
            payload.custom_hour_2 = u2.hour;
            payload.custom_minute_2 = u2.minute;
          } else {
            const u = localTimeToUtc(hmToHHMM(t));
            if (!u) throw new Error("Pick a valid time.");
            payload.custom_hour = u.hour;
            payload.custom_minute = u.minute;
          }
          await onSave(user.user_id, payload);
        } catch (e) {
          setError(e.message);
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4 modal-backdrop"
             style={{background: 'rgba(24, 24, 27, 0.5)'}} onClick={onClose}>
          <div className="w-full max-w-xl modal-panel flex flex-col shadow-2xl"
               style={{maxHeight: '90vh', background:'#fcfaf7', border:'1px solid #d4d4d8'}}
               onClick={e => e.stopPropagation()}>

            {/* Modal header */}
            <div className="px-7 py-5 flex items-start justify-between flex-shrink-0"
                 style={{borderBottom:'3px double #18181b'}}>
              <div>
                <h2 className="serif text-2xl font-bold text-zinc-900">Edit subscriber</h2>
                <p className="font-mono text-sm text-zinc-500 mt-0.5">{user.phone}</p>
              </div>
              <button onClick={onClose}
                className="text-zinc-400 hover:text-zinc-800 text-2xl leading-none mt-1">×</button>
            </div>

            {/* Scrollable body */}
            <div className="px-7 py-6 space-y-6 overflow-y-auto flex-1">
              {error && (
                <div className="px-4 py-3 border border-red-300 bg-red-50 text-red-700 text-sm">{error}</div>
              )}

              {/* Topics */}
              <div>
                <label className="block text-xs tracking-widest uppercase text-zinc-500 mb-2" style={{fontFamily:'Satoshi,sans-serif'}}>Topics</label>
                <textarea rows={3} value={topics} onChange={e => setTopics(e.target.value)}
                  className="w-full px-4 py-3 border border-zinc-300 focus:border-zinc-900 outline-none align-top text-sm"
                  style={{background:'#fcfaf7', fontFamily:'Satoshi,sans-serif', resize:'vertical'}}></textarea>
                <p className={["mt-1 text-xs", valid ? "text-zinc-400" : "text-amber-600"].join(' ')}
                   style={{fontFamily:'Satoshi,sans-serif'}}>
                  {topicList.length} of 5 topics minimum
                </p>
              </div>

              {/* Schedule */}
              <div>
                <label className="block text-xs tracking-widest uppercase text-zinc-500 mb-2" style={{fontFamily:'Satoshi,sans-serif'}}>Schedule</label>
                <div className="space-y-1">
                  {FREQ_OPTIONS.map(opt => {
                    const sel = frequency === opt.value;
                    const detail = describeOption(opt, times[opt.value]);
                    return (
                      <React.Fragment key={opt.value}>
                        <label className={[
                          "flex items-start p-3 border cursor-pointer transition",
                          sel ? "border-zinc-900 bg-zinc-900" : "border-zinc-200 hover:border-zinc-400"
                        ].join(' ')}>
                          <input type="radio" name="frequency" value={opt.value}
                            checked={sel} onChange={() => setFrequency(opt.value)} className="sr-only" />
                          <div className="flex-1">
                            <div className={["text-sm font-medium", sel ? "text-white" : "text-zinc-800"].join(' ')}
                                 style={{fontFamily:'Satoshi,sans-serif'}}>
                              {opt.label}
                            </div>
                            <div className={["text-xs mt-0.5", sel ? "text-zinc-300" : "text-zinc-400"].join(' ')}
                                 style={{fontFamily:'Satoshi,sans-serif'}}>
                              {detail}
                            </div>
                          </div>
                          {sel && (
                            <span className="text-xs text-zinc-300 ml-2 mt-0.5">✓</span>
                          )}
                        </label>
                        {sel && (
                          <SchedulePicker opt={opt} value={times[opt.value]}
                            onChange={(t) => setTimes(ts => ({ ...ts, [opt.value]: t }))} />
                        )}
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="px-7 py-5 flex justify-end gap-3 flex-shrink-0"
                 style={{borderTop:'1px solid #d4d4d8'}}>
              <button onClick={onClose} disabled={saving}
                className="text-xs tracking-widest uppercase text-zinc-600 border border-zinc-300 px-5 py-2.5 hover:bg-zinc-100 transition disabled:opacity-40"
                style={{fontFamily:'Satoshi,sans-serif'}}>
                Cancel
              </button>
              <button onClick={save} disabled={!valid || saving}
                className="text-xs tracking-widest uppercase border border-zinc-900 bg-zinc-900 text-white px-5 py-2.5 hover:bg-zinc-700 transition disabled:opacity-40"
                style={{fontFamily:'Satoshi,sans-serif'}}>
                {saving ? 'Saving…' : 'Save changes'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
