<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NewsAgent — sign up</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=bespoke-serif@400,500,700&f[]=satoshi@400,500,700&display=swap');

    body {
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #fcfaf7;
      color: #1a1a1a;
    }
    .serif { font-family: 'Bespoke Serif', Georgia, serif; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-enter { animation: fadeSlide 400ms cubic-bezier(0.4, 0, 0.2, 1); }

    input, textarea { background: transparent !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useMemo } = React;

    const FREQ_OPTIONS = [
      { value: 'every_4h',     label: 'Every 4 hours',     icon: 'lucide:zap',        kind: 'startTime', defaults: { h: 8,  m: 0 } },
      { value: 'every_8h',     label: 'Every 8 hours',     icon: 'lucide:refresh-cw', kind: 'startTime', defaults: { h: 0,  m: 0 } },
      { value: 'morning_9am',  label: 'Morning briefing',  icon: 'lucide:coffee',     kind: 'oneTime',   defaults: { h: 9,  m: 0 } },
      { value: 'evening_6pm',  label: 'Evening wrap-up',   icon: 'lucide:moon',       kind: 'oneTime',   defaults: { h: 18, m: 0 } },
      { value: 'twice_daily',  label: 'Morning + evening', icon: 'lucide:sun-medium', kind: 'twoTimes',  defaults: { am: { h: 9, m: 0 }, pm: { h: 18, m: 0 } } },
      { value: 'custom_daily', label: 'Custom time',       icon: 'lucide:clock',      kind: 'oneTime',   defaults: { h: 9,  m: 0 } },
    ];

    const FREQ_BY_VALUE = Object.fromEntries(FREQ_OPTIONS.map(o => [o.value, o]));

    function pad(n) { return String(n).padStart(2, '0'); }
    function hmToHHMM({ h, m }) { return `${pad(h)}:${pad(m)}`; }

    function localTimeToUtc(hhmm) {
      if (!hhmm) return null;
      const [h, m] = hhmm.split(':').map(Number);
      if (isNaN(h) || isNaN(m)) return null;
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return { hour: d.getUTCHours(), minute: d.getUTCMinutes() };
    }

    function tzLabel() {
      try { return Intl.DateTimeFormat().resolvedOptions().timeZone; }
      catch { return 'local'; }
    }

    function describeOption(opt, t) {
      if (opt.kind === 'oneTime') return `Once a day at ${hmToHHMM(t)} (your time)`;
      if (opt.kind === 'twoTimes') return `At ${hmToHHMM(t.am)} and ${hmToHHMM(t.pm)} (your time)`;
      const stepHours = opt.value === 'every_4h' ? 4 : 8;
      const fires = opt.value === 'every_4h' ? 4 : 3;
      const startMin = t.h * 60 + t.m;
      const out = [];
      for (let i = 0; i < fires; i++) {
        const total = (startMin + i * stepHours * 60) % (24 * 60);
        out.push(`${pad(Math.floor(total / 60))}:${pad(total % 60)}`);
      }
      return `Fires at ${out.join(', ')} (your time)`;
    }

    const TOPIC_SUGGESTIONS = [
      "Technology", "World news", "US politics", "Business & finance",
      "Sports", "Health & wellness", "Science", "Climate & environment",
      "Entertainment", "Travel", "Food & cooking", "Books & culture",
    ];

    const MIN_TOPICS = 5;
    const STEP_LABELS = ["Identity", "Interests", "Cadence", "Finalize"];

    function defaultTimes() {
      const o = {};
      for (const opt of FREQ_OPTIONS) o[opt.value] = opt.defaults;
      return o;
    }

    function App() {
      const [step, setStep] = useState(1);
      const [form, setForm] = useState({ name: '', phone: '', topics: '', frequency: 'morning_9am', times: defaultTimes() });
      const [status, setStatus] = useState({ loading: false, error: null, user: null });

      const update = (patch) => setForm(f => ({ ...f, ...patch }));
      const next = () => setStep(s => Math.min(s + 1, 4));
      const back = () => setStep(s => Math.max(s - 1, 1));

      const submit = async () => {
        setStatus({ loading: true, error: null, user: null });
        const payload = { name: form.name, phone: form.phone, topics: form.topics, frequency: form.frequency };
        const opt = FREQ_BY_VALUE[form.frequency];
        const t = form.times[form.frequency];
        if (opt.kind === 'twoTimes') {
          const u1 = localTimeToUtc(hmToHHMM(t.am));
          const u2 = localTimeToUtc(hmToHHMM(t.pm));
          if (!u1 || !u2) { setStatus({ loading: false, error: "Pick valid times.", user: null }); return; }
          payload.custom_hour = u1.hour; payload.custom_minute = u1.minute;
          payload.custom_hour_2 = u2.hour; payload.custom_minute_2 = u2.minute;
        } else {
          const u = localTimeToUtc(hmToHHMM(t));
          if (!u) { setStatus({ loading: false, error: "Pick a valid time.", user: null }); return; }
          payload.custom_hour = u.hour; payload.custom_minute = u.minute;
        }
        try {
          const resp = await fetch('/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || 'Something went wrong.');
          setStatus({ loading: false, error: null, user: data.user });
        } catch (e) {
          setStatus({ loading: false, error: e.message, user: null });
        }
      };

      if (status.user) return (
        <Success user={status.user} frequencyLabel={status.user.frequency_label} onRestart={() => {
          setStep(1);
          setForm({ name: '', phone: '', topics: '', frequency: 'morning_9am', times: defaultTimes() });
          setStatus({ loading: false, error: null, user: null });
        }} />
      );

      return (
        <div className="min-h-screen flex flex-col bg-[#fcfaf7]">
          <header className="border-b border-zinc-200 py-5 px-6 md:px-12 flex justify-between items-center sticky top-0 z-50 bg-[#fcfaf7]">
            <div className="flex items-center gap-2">
              <iconify-icon icon="lucide:newspaper" class="text-xl"></iconify-icon>
              <span className="serif font-bold text-lg tracking-tight">NEWSAGENT</span>
            </div>
            <a href="/users" className="text-xs font-medium tracking-widest uppercase hover:underline text-zinc-500">Manage Users</a>
          </header>

          <main className="flex-1 flex items-start justify-center p-6 md:p-12">
            <div className="w-full max-w-4xl grid md:grid-cols-[180px_1px_1fr] gap-10 items-start pt-8">

              {/* Sidebar step nav — desktop only */}
              <aside className="hidden md:flex flex-col gap-6 sticky top-24">
                <div className="text-[10px] uppercase tracking-[0.2em] font-black text-zinc-400 mb-2">Registration</div>
                {STEP_LABELS.map((label, i) => {
                  const idx = i + 1;
                  const done = idx < step;
                  const active = idx === step;
                  return (
                    <div key={label} className="flex items-center gap-3">
                      <div className={`w-7 h-7 flex items-center justify-center border text-xs font-bold flex-shrink-0 transition-all ${done || active ? 'border-zinc-900 bg-zinc-900 text-white' : 'border-zinc-300 text-zinc-400'}`}>
                        {done
                          ? <iconify-icon icon="lucide:check" style={{fontSize:'12px'}}></iconify-icon>
                          : `0${idx}`}
                      </div>
                      <span className={`text-sm font-medium ${active ? 'text-zinc-900' : 'text-zinc-400'}`}>{label}</span>
                    </div>
                  );
                })}
              </aside>

              <div className="hidden md:block w-px bg-zinc-200 self-stretch"></div>

              {/* Mobile step indicator */}
              <div className="md:hidden flex items-center gap-2 mb-4 col-span-full">
                <span className="text-[10px] uppercase tracking-[0.2em] font-black text-zinc-400">Step {step} of {STEP_LABELS.length}</span>
                <span className="text-[10px] uppercase tracking-[0.2em] font-black text-zinc-900">— {STEP_LABELS[step - 1]}</span>
              </div>

              <div key={step} className="step-enter min-w-0">
                {status.error && (
                  <div className="mb-8 p-4 bg-zinc-900 text-zinc-100 text-sm">{status.error}</div>
                )}
                {step === 1 && <Step1 form={form} update={update} onNext={next} />}
                {step === 2 && <Step2 form={form} update={update} onNext={next} onBack={back} />}
                {step === 3 && <Step3 form={form} update={update} onNext={next} onBack={back} />}
                {step === 4 && <Step4 form={form} onBack={back} onSubmit={submit} loading={status.loading} />}
              </div>
            </div>
          </main>

          <footer className="border-t border-zinc-200 py-6 px-6 text-[10px] tracking-[0.2em] uppercase text-zinc-400 text-center">
            NewsAgent &mdash; Privacy-First Intelligence
          </footer>
        </div>
      );
    }

    function Step1({ form, update, onNext }) {
      const digits = form.phone.replace(/\D/g, '');
      const phoneValid = digits.length >= 10 && digits.length <= 15;
      const nameValid = form.name.trim().length > 0;
      const valid = phoneValid && nameValid;
      return (
        <div className="max-w-lg">
          <h1 className="serif text-4xl md:text-5xl font-semibold tracking-tight leading-tight mb-3">Your customizable scoop of news.</h1>
          <p className="text-zinc-500 mb-12 text-lg">Your personalized briefing, delivered via iMessage. Let's start with your credentials.</p>

          <div className="space-y-10">
            <div className="border-b border-zinc-300 focus-within:border-zinc-900 transition-colors pb-2">
              <label className="block text-[10px] uppercase tracking-[0.2em] font-black text-zinc-400 mb-2">Subscriber Name</label>
              <input type="text" autoFocus placeholder="Alex" value={form.name}
                onChange={e => update({ name: e.target.value })}
                onKeyDown={e => { if (e.key === 'Enter' && valid) onNext(); }}
                className="w-full py-1 text-xl serif focus:outline-none" />
            </div>
            <div className="border-b border-zinc-300 focus-within:border-zinc-900 transition-colors pb-2">
              <label className="block text-[10px] uppercase tracking-[0.2em] font-black text-zinc-400 mb-2">Phone Number</label>
              <input type="tel" placeholder="+1 (555) 123-4567" value={form.phone}
                onChange={e => update({ phone: e.target.value })}
                onKeyDown={e => { if (e.key === 'Enter' && valid) onNext(); }}
                className="w-full py-1 text-xl serif focus:outline-none" />
              <p className="mt-2 text-xs text-zinc-400">US numbers — +1 added automatically.</p>
            </div>
          </div>

          <div className="mt-14">
            <button onClick={onNext} disabled={!valid}
              className="px-10 py-4 bg-zinc-900 text-white text-sm font-bold tracking-widest uppercase hover:bg-zinc-700 transition-colors disabled:opacity-20 flex items-center gap-2">
              Continue <iconify-icon icon="lucide:arrow-right"></iconify-icon>
            </button>
          </div>
        </div>
      );
    }

    function Step2({ form, update, onNext, onBack }) {
      const topicList = form.topics.split(/[,\n;]/).map(t => t.trim()).filter(Boolean);
      const addedSet = useMemo(() => new Set(topicList.map(t => t.toLowerCase())), [form.topics]);
      const addChip = (s) => {
        const cur = form.topics.trim();
        const sep = cur && !cur.endsWith(',') ? ', ' : '';
        update({ topics: cur + sep + s });
      };
      const valid = topicList.length >= MIN_TOPICS;
      return (
        <div className="max-w-lg">
          <h1 className="serif text-4xl md:text-5xl font-semibold tracking-tight leading-tight mb-3">Define your sphere.</h1>
          <p className="text-zinc-500 mb-12 text-lg">
            List at least {MIN_TOPICS} topics, comma-separated. <span className="font-semibold text-zinc-700">"EU AI Act"</span> beats <span className="font-semibold text-zinc-700">"AI"</span>.
          </p>

          <textarea autoFocus rows={4}
            className="w-full p-4 border border-zinc-300 focus:border-zinc-900 focus:outline-none text-base serif resize-none"
            placeholder="EU AI regulation, NBA trades, climate finance..."
            value={form.topics}
            onChange={e => update({ topics: e.target.value })} />

          <div className="mt-6">
            <div className="text-[10px] uppercase tracking-[0.2em] font-black text-zinc-400 mb-3">Suggestions</div>
            <div className="flex flex-wrap gap-2">
              {TOPIC_SUGGESTIONS.map(s => {
                const added = addedSet.has(s.toLowerCase());
                return (
                  <button key={s} type="button" disabled={added} onClick={() => !added && addChip(s)}
                    className={`px-3 py-1 text-xs border font-medium transition-colors ${added ? 'border-zinc-200 text-zinc-300 line-through cursor-not-allowed' : 'border-zinc-300 text-zinc-600 hover:border-zinc-900 hover:text-zinc-900'}`}>
                    {added ? '✓ ' : '+ '}{s}
                  </button>
                );
              })}
            </div>
          </div>

          <p className={`mt-4 text-xs font-bold tracking-widest uppercase ${valid ? 'text-zinc-400' : 'text-amber-600'}`}>
            {topicList.length} / {MIN_TOPICS} topics minimum
          </p>

          <NavRow onBack={onBack} onNext={onNext} nextDisabled={!valid} nextLabel="Set Schedule" />
        </div>
      );
    }

    function SchedulePicker({ opt, value, onChange }) {
      if (opt.kind === 'twoTimes') {
        return (
          <div className="ml-10 mt-2 mb-3 p-4 border border-zinc-200 bg-zinc-50/50 space-y-4">
            <div>
              <label className="block text-[10px] uppercase tracking-[0.15em] font-black text-zinc-400 mb-2">Morning time</label>
              <input type="time" value={hmToHHMM(value.am)}
                onChange={e => { const [h,m] = e.target.value.split(':').map(Number); if (!isNaN(h)&&!isNaN(m)) onChange({...value, am:{h,m}}); }}
                className="px-3 py-2 border border-zinc-300 focus:border-zinc-900 focus:outline-none text-base" />
            </div>
            <div>
              <label className="block text-[10px] uppercase tracking-[0.15em] font-black text-zinc-400 mb-2">Evening time</label>
              <input type="time" value={hmToHHMM(value.pm)}
                onChange={e => { const [h,m] = e.target.value.split(':').map(Number); if (!isNaN(h)&&!isNaN(m)) onChange({...value, pm:{h,m}}); }}
                className="px-3 py-2 border border-zinc-300 focus:border-zinc-900 focus:outline-none text-base" />
            </div>
            <p className="text-xs text-zinc-400">Timezone: <span className="font-mono">{tzLabel()}</span></p>
          </div>
        );
      }
      const label = opt.kind === 'startTime' ? 'Starting time' : 'Time';
      return (
        <div className="ml-10 mt-2 mb-3 p-4 border border-zinc-200 bg-zinc-50/50">
          <label className="block text-[10px] uppercase tracking-[0.15em] font-black text-zinc-400 mb-2">{label}</label>
          <input type="time" value={hmToHHMM(value)}
            onChange={e => { const [h,m] = e.target.value.split(':').map(Number); if (!isNaN(h)&&!isNaN(m)) onChange({h,m}); }}
            className="px-3 py-2 border border-zinc-300 focus:border-zinc-900 focus:outline-none text-base" />
          <p className="mt-2 text-xs text-zinc-400">Timezone: <span className="font-mono">{tzLabel()}</span></p>
        </div>
      );
    }

    function Step3({ form, update, onNext, onBack }) {
      const setTime = (freq, t) => update({ times: { ...form.times, [freq]: t } });
      return (
        <div className="max-w-xl">
          <h1 className="serif text-4xl md:text-5xl font-semibold tracking-tight leading-tight mb-3">Select your cadence.</h1>
          <p className="text-zinc-500 mb-12 text-lg">How often should NewsAgent deliver your briefing?</p>

          <div className="space-y-2">
            {FREQ_OPTIONS.map(opt => {
              const selected = form.frequency === opt.value;
              const detail = describeOption(opt, form.times[opt.value]);
              return (
                <React.Fragment key={opt.value}>
                  <label className={`flex items-center gap-4 p-4 border cursor-pointer transition-all ${selected ? 'border-zinc-900 bg-zinc-900/5' : 'border-zinc-200 hover:border-zinc-400'}`}>
                    <input type="radio" name="frequency" value={opt.value} checked={selected}
                      onChange={() => update({ frequency: opt.value })} className="sr-only" />
                    <iconify-icon icon={opt.icon} class={`text-lg flex-shrink-0 ${selected ? 'text-zinc-900' : 'text-zinc-400'}`}></iconify-icon>
                    <div className="flex-1 min-w-0">
                      <div className={`text-sm font-bold uppercase tracking-wider ${selected ? 'text-zinc-900' : 'text-zinc-600'}`}>{opt.label}</div>
                      <div className="text-xs text-zinc-500 mt-0.5">{detail}</div>
                    </div>
                    <div className={`w-4 h-4 border-2 flex-shrink-0 flex items-center justify-center ${selected ? 'border-zinc-900 bg-zinc-900' : 'border-zinc-300'}`}>
                      {selected && <div className="w-1.5 h-1.5 bg-white" />}
                    </div>
                  </label>
                  {selected && (
                    <SchedulePicker opt={opt} value={form.times[opt.value]} onChange={t => setTime(opt.value, t)} />
                  )}
                </React.Fragment>
              );
            })}
          </div>

          <NavRow onBack={onBack} onNext={onNext} nextLabel="Review" />
        </div>
      );
    }

    function Step4({ form, onBack, onSubmit, loading }) {
      const freq = FREQ_BY_VALUE[form.frequency];
      const topics = form.topics.split(/[,\n;]/).map(t => t.trim()).filter(Boolean);
      const scheduleDetail = describeOption(freq, form.times[form.frequency]);
      return (
        <div className="max-w-xl">
          <h1 className="serif text-4xl md:text-5xl font-semibold tracking-tight leading-tight mb-3">Confirm your subscription.</h1>
          <p className="text-zinc-500 mb-12 text-lg">Verify your details before we activate your briefing.</p>

          <div className="border border-zinc-900 p-6 space-y-6">
            <ReviewRow label="Subscriber" value={form.name} />
            <ReviewRow label="Endpoint" value={form.phone} />
            <ReviewRow label="Coverage Area" value={
              <div className="flex flex-wrap gap-1.5 mt-1">
                {topics.map(t => (
                  <span key={t} className="text-xs font-medium border border-zinc-300 px-2 py-0.5">{t}</span>
                ))}
              </div>
            } />
            <ReviewRow label="Frequency" value={`${freq.label} — ${scheduleDetail}`} />
          </div>

          <div className="mt-12 flex items-center justify-between">
            <button onClick={onBack} disabled={loading}
              className="text-sm font-bold tracking-widest uppercase border-b border-zinc-900 py-1 hover:text-zinc-500 transition-colors disabled:opacity-40">
              Go Back
            </button>
            <button onClick={onSubmit} disabled={loading}
              className="px-10 py-4 bg-zinc-900 text-white text-sm font-bold tracking-widest uppercase hover:bg-zinc-700 transition-colors disabled:opacity-50 flex items-center gap-2">
              {loading ? 'Processing...' : 'Activate Subscription'}
            </button>
          </div>
        </div>
      );
    }

    function ReviewRow({ label, value }) {
      return (
        <div>
          <dt className="text-[10px] uppercase tracking-[0.2em] font-black text-zinc-400">{label}</dt>
          <dd className="mt-1 text-zinc-900 serif text-lg">{value}</dd>
        </div>
      );
    }

    function NavRow({ onBack, onNext, nextDisabled, nextLabel = "Continue" }) {
      return (
        <div className="mt-12 flex items-center justify-between">
          {onBack ? (
            <button type="button" onClick={onBack}
              className="text-sm font-bold tracking-widest uppercase border-b border-zinc-900 py-1 hover:text-zinc-500 transition-colors">
              Go Back
            </button>
          ) : <div />}
          <button type="button" onClick={onNext} disabled={nextDisabled}
            className="px-10 py-4 bg-zinc-900 text-white text-sm font-bold tracking-widest uppercase hover:bg-zinc-700 transition-colors disabled:opacity-20 flex items-center gap-2">
            {nextLabel} <iconify-icon icon="lucide:arrow-right"></iconify-icon>
          </button>
        </div>
      );
    }

    function Success({ user, frequencyLabel, onRestart }) {
      return (
        <div className="min-h-screen flex flex-col bg-[#fcfaf7]">
          <header className="border-b border-zinc-200 py-5 px-6 md:px-12 flex justify-between items-center bg-[#fcfaf7]">
            <div className="flex items-center gap-2">
              <iconify-icon icon="lucide:newspaper" class="text-xl"></iconify-icon>
              <span className="serif font-bold text-lg tracking-tight">NEWSAGENT</span>
            </div>
          </header>
          <div className="flex-1 flex items-center justify-center p-6">
            <div className="max-w-xl w-full text-center">
              <h1 className="serif text-4xl md:text-5xl font-semibold tracking-tight leading-tight mb-4">
                {user.name ? `Welcome aboard, ${user.name.split(' ')[0]}.` : "You're all set."}
              </h1>
              <p className="text-zinc-500 mb-12 text-lg">
                Your first briefing will be dispatched to <span className="font-bold text-zinc-900">{user.phone}</span> at the next scheduled time.
              </p>
              <div className="border border-zinc-200 p-6 text-left space-y-4 mb-12">
                <ReviewRow label="Topics" value={(user.interests || []).join(', ')} />
                <ReviewRow label="Schedule" value={frequencyLabel || user.frequency} />
              </div>
              <div className="flex flex-col md:flex-row items-center justify-center gap-4">
                <button onClick={onRestart}
                  className="w-full md:w-auto px-8 py-4 bg-zinc-900 text-white text-sm font-bold tracking-widest uppercase hover:bg-zinc-700 transition-colors">
                  Sign Up Another
                </button>
                <a href="/users"
                  className="w-full md:w-auto px-8 py-4 border border-zinc-900 text-sm font-bold tracking-widest uppercase hover:bg-zinc-900 hover:text-white transition-all text-center">
                  Manage Users
                </a>
              </div>
            </div>
          </div>
          <footer className="border-t border-zinc-200 py-6 px-6 text-[10px] tracking-[0.2em] uppercase text-zinc-400 text-center">
            NewsAgent &mdash; Privacy-First Intelligence
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
